<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>工場在庫管理</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#1a202c;font-size:15px;max-width:480px;margin:0 auto}
.hdr{background:#1F4E79;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px}
.hdr h1{font-size:17px;font-weight:700}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e2e8f0}
.tab{flex:1;padding:10px 2px;text-align:center;font-size:12px;font-weight:700;color:#718096;cursor:pointer;border:none;background:none}
.tab.active{color:#1F4E79;border-bottom:3px solid #1F4E79;margin-bottom:-2px}
.page{display:none;padding:12px}
.page.active{display:block}
.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid #e2e8f0}
.card h2{font-size:14px;color:#2d3748;margin-bottom:10px;font-weight:700}
label{display:block;font-size:12px;color:#718096;margin-bottom:4px;margin-top:10px;font-weight:600}
input,select{width:100%;padding:9px 12px;border:1.5px solid #cbd5e0;border-radius:8px;font-size:14px;color:#2d3748;background:#fff}
input:focus,select:focus{outline:none;border-color:#1F4E79}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px}
.btn-blue{background:#1F4E79;color:#fff}
.btn-green{background:#276749;color:#fff}
.btn-orange{background:#C05621;color:#fff}
.btn-gray{background:#EDF2F7;color:#4A5568}
.btn-sm{padding:6px 12px;font-size:12px;width:auto;border-radius:6px;font-weight:700;border:none;cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700}
.bg-g{background:#C6F6D5;color:#276749}
.bg-r{background:#FED7D7;color:#9B2C2C}
.bg-b{background:#BEE3F8;color:#2B6CB0}
.bg-y{background:#FEFCBF;color:#744210}
.item-card{background:#fff;border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid #e2e8f0}
.item-name{font-weight:700;font-size:14px}
.item-loc{font-size:12px;color:#4A5568;margin-top:3px}
.item-meta{font-size:11px;color:#a0aec0;margin-top:2px}
.item-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.result-box{padding:12px;border-radius:8px;margin:8px 0;font-size:13px;line-height:1.6}
.result-blue{background:#EBF8FF;border:1.5px solid #90CDF4}
.result-green{background:#F0FFF4;border:1.5px solid #9AE6B4}
.msg{padding:10px 12px;border-radius:8px;margin:6px 0;font-size:13px;font-weight:700}
.msg-ok{background:#C6F6D5;color:#276749}
.msg-err{background:#FED7D7;color:#9B2C2C}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:#fff;border-radius:10px;padding:10px 8px;border:1px solid #e2e8f0;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:#1F4E79}
.stat-label{font-size:10px;color:#718096;margin-top:2px}
.qr-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qr-card{background:#fff;border-radius:10px;padding:10px;border:1px solid #e2e8f0;text-align:center}
.qr-card p{font-size:11px;color:#4A5568;margin-top:6px;font-weight:700;word-break:break-all}
.scan-box{border:2px dashed #90CDF4;border-radius:10px;padding:10px;text-align:center;background:#f7fafc;margin:8px 0}
.step-num{display:inline-block;background:#1F4E79;color:#fff;border-radius:50%;width:20px;height:20px;text-align:center;line-height:20px;font-size:11px;font-weight:700;margin-right:4px}
</style>
</head>
<body>
<div class="hdr">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
  <h1>工場在庫管理</h1>
</div>
<div class="tabs">
  <button class="tab active" onclick="showPage('home',this)">ホーム</button>
  <button class="tab" onclick="showPage('scan',this)">スキャン</button>
  <button class="tab" onclick="showPage('list',this)">一覧</button>
  <button class="tab" onclick="showPage('qrgen',this)">QR作成</button>
</div>

<!-- ホーム -->
<div id="page-home" class="page active">
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num" id="s-items">0</div><div class="stat-label">物品数</div></div>
    <div class="stat-card"><div class="stat-num" id="s-locs">0</div><div class="stat-label">場所数</div></div>
  </div>
  <div class="card">
    <h2>物品を登録</h2>
    <label>物品名</label>
    <input id="ni-name" placeholder="例：金型A-001、材料POM白">
    <label>種別</label>
    <select id="ni-type">
      <option>金型</option><option>材料</option><option>工具</option><option>部品</option><option>その他</option>
    </select>
    <label>数量</label>
    <input id="ni-qty" type="number" value="1" min="0">
    <label>メモ（任意）</label>
    <input id="ni-note" placeholder="例：赤ラベル・重さ5kg">
    <button class="btn btn-blue" onclick="addItem()">登録する</button>
    <div id="add-msg"></div>
  </div>
  <div class="card">
    <h2>場所（棚・ラック）を登録</h2>
    <label>場所名</label>
    <input id="nl-name" placeholder="例：棚A-1段目、原料室B棚">
    <button class="btn btn-green" onclick="addLoc()">場所を登録する</button>
    <div id="loc-msg"></div>
  </div>
</div>

<!-- スキャン -->
<div id="page-scan" class="page">
  <div class="card">
    <h2>QRスキャンで場所を記録</h2>
    <p style="font-size:12px;color:#718096;margin-bottom:8px">物品QR → 場所QR の順に読んでください</p>

    <div class="scan-box">
      <div id="qr-reader" style="width:100%"></div>
      <button class="btn btn-blue" onclick="startScan()" id="btn-start" style="margin-top:8px">カメラ起動してスキャン</button>
      <button class="btn btn-gray" onclick="stopScan()" id="btn-stop" style="display:none;margin-top:8px">停止する</button>
    </div>

    <div id="scan-step" style="font-size:13px;color:#4A5568;text-align:center;padding:6px;font-weight:700">
      物品のQRを読んでください
    </div>
    <div id="r-item" class="result-box result-blue" style="display:none"></div>
    <div id="r-loc" class="result-box result-green" style="display:none"></div>
    <button class="btn btn-green" id="btn-confirm" style="display:none" onclick="confirmMove()">この場所に記録する</button>
    <button class="btn btn-gray" id="btn-reset" style="display:none" onclick="resetScan()">やり直す</button>
    <div id="scan-msg"></div>
  </div>

  <div class="card">
    <h2>手動で更新（カメラ不要）</h2>
    <p style="font-size:12px;color:#718096;margin-bottom:4px">リストから選ぶだけで更新できます</p>
    <label>物品</label><select id="m-item"></select>
    <label>移動先の場所</label><select id="m-loc"></select>
    <label>数量（変更する場合だけ）</label>
    <input id="m-qty" type="number" placeholder="空欄なら変更なし">
    <button class="btn btn-orange" onclick="manualMove()">手動で更新する</button>
    <div id="manual-msg"></div>
  </div>
</div>

<!-- 一覧 -->
<div id="page-list" class="page">
  <div class="card" style="padding:10px 12px;margin-bottom:8px">
    <input id="search" placeholder="品名・場所で検索..." oninput="renderList()" style="margin:0">
  </div>
  <div id="item-list"></div>
</div>

<!-- QR作成 -->
<div id="page-qrgen" class="page">
  <div class="card">
    <p style="font-size:12px;color:#718096;margin-bottom:10px">QRコードが表示されたらスクリーンショットして印刷し、物品と棚に貼ってください。</p>
    <div style="font-size:12px;font-weight:700;color:#718096;margin-bottom:8px">物品QRコード</div>
    <div class="qr-grid" id="qr-items"></div>
    <div style="font-size:12px;font-weight:700;color:#718096;margin:16px 0 8px">場所QRコード</div>
    <div class="qr-grid" id="qr-locs"></div>
  </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('inv4') || '{"items":{},"locs":{}}');
let sc = {step:0, itemId:null, locId:null};
let scanner = null;
let isScanning = false;

function save(){ localStorage.setItem('inv4', JSON.stringify(db)); updateStats(); }
function genId(p){ return p+Date.now()+Math.random().toString(36).slice(2,5); }
function today(){ return new Date().toLocaleDateString('ja-JP'); }

function showMsg(id,txt,ok){
  const el=document.getElementById(id);
  if(!el)return;
  el.className='msg '+(ok?'msg-ok':'msg-err');
  el.textContent=txt;
  setTimeout(()=>{el.textContent='';el.className='';},4000);
}

function updateStats(){
  document.getElementById('s-items').textContent=Object.keys(db.items).length;
  document.getElementById('s-locs').textContent=Object.keys(db.locs).length;
}

function addItem(){
  const name=document.getElementById('ni-name').value.trim();
  if(!name){showMsg('add-msg','物品名を入力してください',false);return;}
  const id=genId('ITEM-');
  db.items[id]={name,type:document.getElementById('ni-type').value,qty:parseInt(document.getElementById('ni-qty').value)||0,note:document.getElementById('ni-note').value.trim(),location:'',locationName:'未設定',updated:today()};
  save();renderList();renderQR();renderSelects();
  document.getElementById('ni-name').value='';
  showMsg('add-msg','「'+name+'」を登録しました',true);
}

function addLoc(){
  const name=document.getElementById('nl-name').value.trim();
  if(!name){showMsg('loc-msg','場所名を入力してください',false);return;}
  const id=genId('LOC-');
  db.locs[id]={name};
  save();renderQR();renderSelects();
  document.getElementById('nl-name').value='';
  showMsg('loc-msg','「'+name+'」を登録しました',true);
}

function startScan(){
  if(isScanning)return;
  isScanning=true;
  document.getElementById('btn-start').style.display='none';
  document.getElementById('btn-stop').style.display='block';
  scanner=new Html5Qrcode("qr-reader");
  scanner.start(
    {facingMode:"environment"},
    {fps:10,qrbox:{width:220,height:220}},
    onScan,
    ()=>{}
  ).catch(err=>{
    isScanning=false;
    document.getElementById('btn-start').style.display='block';
    document.getElementById('btn-stop').style.display='none';
    showMsg('scan-msg','カメラを起動できません。下の手動更新を使ってください。',false);
  });
}

function stopScan(){
  isScanning=false;
  document.getElementById('btn-start').style.display='block';
  document.getElementById('btn-stop').style.display='none';
  if(scanner){scanner.stop().catch(()=>{});scanner=null;}
}

function onScan(decoded){
  if(sc.step===0){
    if(db.items[decoded]){
      sc.itemId=decoded; sc.step=1;
      const it=db.items[decoded];
      document.getElementById('r-item').style.display='block';
      document.getElementById('r-item').innerHTML='<strong>物品：'+it.name+'</strong><br>種別：'+it.type+'　残数：'+it.qty+'個<br>現在の場所：'+it.locationName;
      document.getElementById('scan-step').textContent='次に場所のQRを読んでください';
    } else if(db.locs[decoded]){
      showMsg('scan-msg','先に物品QRを読んでください',false);
    } else {
      showMsg('scan-msg','登録されていないQRコードです',false);
    }
  } else if(sc.step===1){
    if(db.locs[decoded]){
      sc.locId=decoded; sc.step=2;
      stopScan();
      document.getElementById('r-loc').style.display='block';
      document.getElementById('r-loc').innerHTML='<strong>場所：'+db.locs[decoded].name+'</strong>';
      document.getElementById('btn-confirm').style.display='block';
      document.getElementById('btn-reset').style.display='block';
      document.getElementById('scan-step').textContent='確認して「記録する」を押してください';
    } else if(db.items[decoded]){
      showMsg('scan-msg','場所QRを読んでください',false);
    } else {
      showMsg('scan-msg','登録されていないQRコードです',false);
    }
  }
}

function confirmMove(){
  const it=db.items[sc.itemId];
  const lo=db.locs[sc.locId];
  it.location=sc.locId; it.locationName=lo.name; it.updated=today();
  save(); renderList();
  showMsg('scan-msg','「'+it.name+'」→「'+lo.name+'」に記録しました！',true);
  resetScan();
}

function resetScan(){
  sc={step:0,itemId:null,locId:null};
  ['r-item','r-loc','btn-confirm','btn-reset'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('scan-step').textContent='物品のQRを読んでください';
}

function manualMove(){
  const iid=document.getElementById('m-item').value;
  const lid=document.getElementById('m-loc').value;
  const qty=document.getElementById('m-qty').value;
  if(!iid||!lid){showMsg('manual-msg','物品と場所を選んでください',false);return;}
  db.items[iid].location=lid;
  db.items[iid].locationName=db.locs[lid].name;
  if(qty!=='')db.items[iid].qty=parseInt(qty)||0;
  db.items[iid].updated=today();
  save();renderList();
  showMsg('manual-msg','「'+db.items[iid].name+'」→「'+db.locs[lid].name+'」に更新しました',true);
  document.getElementById('m-qty').value='';
}

function renderSelects(){
  const mi=document.getElementById('m-item');
  const ml=document.getElementById('m-loc');
  if(mi)mi.innerHTML='<option value="">選択...</option>'+Object.entries(db.items).map(([id,it])=>`<option value="${id}">${it.name}</option>`).join('');
  if(ml)ml.innerHTML='<option value="">選択...</option>'+Object.entries(db.locs).map(([id,lo])=>`<option value="${id}">${lo.name}</option>`).join('');
}

function renderList(){
  const q=document.getElementById('search').value.toLowerCase();
  const el=document.getElementById('item-list');
  const entries=Object.entries(db.items).filter(([id,it])=>!q||it.name.toLowerCase().includes(q)||it.locationName.toLowerCase().includes(q));
  if(!entries.length){el.innerHTML='<div class="card" style="text-align:center;color:#a0aec0;padding:20px">物品がありません</div>';return;}
  el.innerHTML=entries.map(([id,it])=>{
    const qb=it.qty<=0?'bg-r':it.qty<=3?'bg-y':'bg-g';
    return `<div class="item-card">
      <div style="display:flex;gap:8px;align-items:flex-start">
        <div style="flex:1">
          <div class="item-name">${it.name}</div>
          <div class="item-loc">場所：<strong style="color:#1F4E79">${it.locationName}</strong></div>
          <div class="item-meta">${it.type}　更新：${it.updated}${it.note?' / '+it.note:''}</div>
        </div>
        <span class="badge ${qb}">残 ${it.qty}</span>
      </div>
      <div class="item-actions">
        <button class="btn-sm" style="background:#276749;color:#fff" onclick="chQty('${id}',1)">+1</button>
        <button class="btn-sm" style="background:#C05621;color:#fff" onclick="chQty('${id}',-1)">-1</button>
        <button class="btn-sm" style="background:#EDF2F7;color:#718096" onclick="delItem('${id}')">削除</button>
      </div>
    </div>`;
  }).join('');
}

function chQty(id,d){
  if(!db.items[id])return;
  db.items[id].qty=Math.max(0,(db.items[id].qty||0)+d);
  db.items[id].updated=today();
  save();renderList();
}

function delItem(id){
  if(!confirm('「'+db.items[id].name+'」を削除しますか？'))return;
  delete db.items[id];save();renderList();renderSelects();renderQR();
}

function renderQR(){
  const ig=document.getElementById('qr-items');
  const lg=document.getElementById('qr-locs');
  if(!ig||!lg)return;
  ig.innerHTML='';lg.innerHTML='';
  Object.entries(db.items).forEach(([id,it])=>{
    const div=document.createElement('div');div.className='qr-card';
    div.innerHTML=`<div id="qi-${id}"></div><p>${it.name}</p>`;
    ig.appendChild(div);
    setTimeout(()=>{try{new QRCode(document.getElementById('qi-'+id),{text:id,width:100,height:100,correctLevel:QRCode.CorrectLevel.M});}catch(e){}},100);
  });
  Object.entries(db.locs).forEach(([id,lo])=>{
    const div=document.createElement('div');div.className='qr-card';
    div.innerHTML=`<div id="ql-${id}"></div><p>${lo.name}</p>`;
    lg.appendChild(div);
    setTimeout(()=>{try{new QRCode(document.getElementById('ql-'+id),{text:id,width:100,height:100,correctLevel:QRCode.CorrectLevel.M});}catch(e){}},100);
  });
}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='list')renderList();
  if(name==='qrgen')renderQR();
  if(name==='scan')renderSelects();
}

updateStats();renderList();renderSelects();
</script>
</body>
</html>
